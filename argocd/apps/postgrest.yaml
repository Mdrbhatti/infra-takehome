apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgrest
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Mdrbhatti/infra-takehome.git
    path: argocd/postgrest
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: postgrest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
